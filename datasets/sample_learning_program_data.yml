- snowfakery_version: 3
# =============================================================================
# Snowfakery Recipe: Connected University — Learning Programs
# Objects: Learning, LearningProgram, LearningAchievement, LearningOutcomeItem
#
# STRUCTURE
# ---------
# Each program is built as a Learning record with "friends":
#   Learning (1)
#     └─ LearningProgram (1)         via friends
#     └─ LearningAchievement (1)     via friends
#     └─ LearningOutcomeItem (1)     via friends, references Learning + Achievement
#
# PROGRAM COUNT: 10 (6 Undergraduate, 4 Graduate)
#
# ACCOUNT REFERENCES (defined in sample_data.yml)
#   Connected : Connected University (ProviderId + IssuerId on all records)
# =============================================================================

# =============================================================================
# UNDERGRADUATE PROGRAMS  (6)
# =============================================================================

- object: Learning
  nickname: Learning_BS_Chemistry
  fields:
    Name: Bachelor of Science in Chemistry
    AcademicLevel: Undergraduate
    IsActive: true
    Duration: 128
    DurationUnit: Credit Hours
    Type: LearningProgram
    ProviderId:
      reference: Connected
  friends:
    - object: LearningProgram
      fields:
        Name: Bachelor of Science in Chemistry
        LearningId:
          reference: Learning_BS_Chemistry
        IsTopLevelProgram: true
    - object: LearningAchievement
      nickname: Achievement_BS_Chemistry
      fields:
        Name: Bachelor of Science in Chemistry Achievement
        AcademicLevel: Undergraduate
        IssuerId:
          reference: Connected
        RecordType: Learning_Program
    - object: LearningOutcomeItem
      fields:
        LearningId:
          reference: Learning_BS_Chemistry
        LearningAchievementId:
          reference: Achievement_BS_Chemistry
        Duration: 128
        DurationUnit: Credit Hours
        IsPrimary: true

