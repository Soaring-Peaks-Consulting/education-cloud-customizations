- snowfakery_version: 3
# =============================================================================
# Snowfakery Recipe: Connected University — AcademicTermEnrollment Records
# Depends on: sample_account_data.yml and sample_academic_calendar_data.yml (included via sample_data.yml)
#
# STUDENT PERSONAS
# ----------------
# Sophia Student     — Incoming Freshman: enrolled in Fall (current) only
# Student 2 (Senior) — Undergraduate Senior: 7 terms, Fall minus3 → Spring current
# Student 3 (Grad)   — Graduate Student: 3 terms, Fall minus1 → Spring current
# Student 4 (Alumni) — Gruduated Spring minus1
# Student 5          — Continuing Sophomore, enrolled since Fall minus1
# Student 6          — Continuing Junior, enrolled since Fall minus2, skipped a term
# Student 7          — Graduate student who withdrew mid-program, now re-admitted
#
# AcademicTermEnrollment Fields:
#   AcademicTermId          - reference to AcademicTerm
#   EnrollmentDate          - date of enrollment
#   EnrollmentReason        - First Time | Continuing | Transfer in | Re-admit
#   EnrollmentStatus        - Active | Dropout | Expelled | Active | No show
#                             | Other | Transferred | Withdrawn
#   ExitDate                - populated only for Dropout, Expelled, Withdrawn
#   ExitReason              - text, populated only for Dropout, Expelled, Withdrawn
#   LearnerAccountId        - reference to PersonAccount
#   StudentAcademicLevel    - Undergraduate | Graduate | Doctoral
#                             | Professional Education
#   StudyYearClassification - Freshman | Sophomore | Junior | Senior
#   TermGradePointAverage   - number(2,4), only populated for completed terms
# =============================================================================

# =============================================================================
# SOPHIA STUDENT — Incoming Freshman
# First and only term: Fall (current). No GPA yet (term in progress).
# =============================================================================
- object: AcademicTermEnrollment
  fields:
    AcademicTermId:
      reference: Term_Fall_current
    LearnerAccountId:
      reference: Sophia
    LearnerContactId:
      reference: Sophia_Contact
    EnrollmentDate:       ${{ today.replace(year=ay_start_year, month=8, day=1) }}
    EnrollmentReason:     First Time
    EnrollmentStatus:     Active
    StudentAcademicLevel: Undergraduate
    StudyYearClassification: Freshman

# =============================================================================
# STUDENT 2 — Undergraduate Senior
# Enrolled Fall minus3 through Spring current (7 terms, skipping summers).
# Completing senior year now; strong consistent GPA.
# =============================================================================

