    AcademicTermId:
      reference: Term_Fall_minus3
    LearnerAccountId:
      reference: Student_2
    LearnerContactId:
      reference: Student_2_Contact
    EnrollmentDate:       ${{ today.replace(year=ay_start_year - 3, month=8, day=1) }}
    EnrollmentReason:     First Time
    EnrollmentStatus:     Active
    StudentAcademicLevel: Undergraduate
    StudyYearClassification: Freshman
    TermGradePointAverage: 3.45

