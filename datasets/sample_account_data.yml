- snowfakery_version: 3
# =============================================================================
# Accounts
# Nicknames are required so academic_term_enrollments.recipe.yml can
# reference each PersonAccount by name when creating AcademicTermEnrollment.
#
# Enrolled or formerly enrolled students (7): Sophia, Student_2 through Student_7
# Prospective students (3): Prospect_1 through Prospect_3 — no enrollments
# =============================================================================

- object: Account
  nickname: Connected
  fields:
    Name: Connected University
    RecordType: College

- object: Account
  nickname: Watson
  fields:
    Name: Watson School of Business
    RecordType: College

# ── Enrolled Students ────────────────────────────────────────────────────────

- object: Account
  nickname: Sophia
  fields:
    FirstName: Sophia
    LastName: Student
    RecordType: PersonAccount
    PersonContactId:
      Salesforce.SpecialObject:
        name: PersonContact
        nickname: Sophia_Contact

