- snowfakery_version: 3
# =============================================================================
# Snowfakery Recipe: Connected University — Learning Program Plans & Requirements
# Objects: LearningProgramPlan, LearningProgramPlanRqmt,
#          LearningAchievement (Achievement_Group type for elective groups),
#          LearningOutcomeItem (linking elective courses to group achievements)
#
# STRUCTURE PER PROGRAM
# ---------------------
#   LearningProgramPlan (1)
#     └─ LearningProgramPlanRqmt (N) — required courses and elective groups
#
# Elective groups are defined BEFORE the plan that uses them so their
# LearningAchievement nicknames are available for LearningProgramPlanRqmt.
#
# ACTIVE FROM DATE
# ----------------
# All plans became active in spring of the prior academic year:
# today.replace(year=today.year-1, month=1, day=15)
#
# PROGRAM SUMMARY
# ---------------
# Undergraduate (6):
#   BS Chemistry           — CHEM/MATH/PHYS core + science electives
#   BS Mathematics         — MATH/STAT/CS core + math electives
#   BS Computer Science    — CS/MATH/STAT core + CS electives
#   BS Biology             — CHEM/PHYS/MATH core + science electives
#   BBA                    — FIN core + business electives
#   BA Psychology          — MATH/STAT core + social science electives
# Graduate (4):
#   MS Computer Science    — CS/STAT core + advanced CS electives
#   MS Data Science        — CS/STAT/MATH core + data science electives
#   MBA                    — MBA core + business electives
#   MS Biology             — CHEM/STAT core + life sciences electives
# =============================================================================

# =============================================================================
# ELECTIVE GROUP ACHIEVEMENTS
# Each group needs a LearningAchievement of RecordType Achievement_Group,
# plus LearningOutcomeItem records linking each eligible course's achievement
# to the group. Defined first so their nicknames can be referenced in
# LearningProgramPlanRqmt below.
# =============================================================================

# ── BS Chemistry: Science Electives ──────────────────────────────────────────
# Choose 9 credits from: PHYS 201, STAT 201, CS 101

- object: LearningAchievement
  nickname: AG_BSChem_SciElectives
  fields:
    Name: BS Chemistry Science Electives
    AcademicLevel: Undergraduate
    IssuerId:
      reference: Connected
    RecordType: Achievement_Group

- object: LearningOutcomeItem
  fields:
    LearningAchievementId:
      reference: AG_BSChem_SciElectives
    LearningId:
      reference: Learning_PHYS201
    Duration: 3
    DurationUnit: Credit Hours
    IsPrimary: false

- object: LearningOutcomeItem
  fields:
    LearningAchievementId:
      reference: AG_BSChem_SciElectives
    LearningId:
      reference: Learning_STAT201
