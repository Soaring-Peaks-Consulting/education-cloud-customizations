# =============================================================================
# LEARNING PROGRAM PLANS & REQUIREMENTS
# =============================================================================

# ── BS Chemistry ──────────────────────────────────────────────────────────────
# Core: CHEM 101 (3), CHEM 101 Lab (1), CHEM 201 (3), CHEM 301 (3),
#        MATH 101 (3), MATH 201 (3), PHYS 101 (3), PHYS 101 Lab (1) = 20 cr
# Science Electives: 9 cr (choose from PHYS 201, STAT 201, CS 101)
# Total core+electives: 29 cr (remainder to 128 satisfied by general ed)

- object: LearningProgramPlan
  nickname: Plan_BS_Chemistry
  fields:
    Name: Bachelor of Science in Chemistry
    LearningProgramId:
      reference: LP_BS_Chemistry
    IsActive: true
    ActiveFromDate: ${{ today.replace(year=today.year-1, month=1, day=15) }}
    ProviderId:
      reference: Connected
  friends:
    - object: LearningProgramPlanRqmt
      fields:
        LearningProgramPlanId:
          reference: Plan_BS_Chemistry
        Name: Introduction to Chemistry
        LearningAchievementId:
          reference: Achievement_CHEM101
        Duration: 3
        DurationUnit: Credit Hours
    - object: LearningProgramPlanRqmt
      fields:
        LearningProgramPlanId:
          reference: Plan_BS_Chemistry
        Name: Introduction to Chemistry Lab
        LearningAchievementId:
          reference: Achievement_CHEM101_Lab
        Duration: 1
        DurationUnit: Credit Hours
    - object: LearningProgramPlanRqmt
