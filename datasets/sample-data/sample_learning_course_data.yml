# =============================================================================
# BULK RANDOM COURSES  (28 courses to reach total of 50)
# Mix of undergraduate and graduate, various subjects and formats.
# These use random_choice for variation but do not participate in prerequisite
# chains, so nicknames are not needed.
# =============================================================================

# ── Bulk Courses (31 courses) ─────────────────────────────────────────────────
# One Learning per row in learning_courses.csv.
# Columns: name, abbreviation, academic_level, course_number_min, course_number_max

- object: Learning
  for_each:
    var: _course
    value:
      Dataset.iterate:
        dataset: learning_courses.csv
  fields:
    Name: ${{ _course.name }}
    AcademicLevel: ${{ _course.academic_level }}
    IsActive: true
    Duration: 3
    DurationUnit: Credit Hours
    Type: LearningCourse
  friends:
    - object: LearningCourse
      fields:
        Name: ${{ Learning.Name }}
        CourseNumber:
          fake.RandomInt:
            min: ${{ _course.course_number_min }}
            max: ${{ _course.course_number_max }}
        SubjectAbbreviation: ${{ _course.abbreviation }}
        LearningId:
          reference: Learning
    - object: LearningAchievement
      fields:
        Name: ${{ Learning.Name + " Achievement" }}
        AcademicLevel: ${{ _course.academic_level }}
        IssuerId:
          reference: Connected
        RecordType: Learning_Course
    - object: LearningOutcomeItem
      fields:
        LearningId:
          reference: Learning
        LearningAchievementId:
          reference: LearningAchievement
        Duration: 3
        DurationUnit: Credit Hours
        IsPrimary: true

# =============================================================================
# LEARNING FOUNDATION ITEMS — PREREQUISITE CHAINS
# Defined after all courses so all nicknames are available.
#
# Each LearningFoundationItem links:
#   LearningId          : the course that HAS a prerequisite requirement
#   LearningAchievementId: the Achievement the student must have earned first
#
# Rigorous courses (CHEM 301, PHYS 201, CS 301, STAT 301, MBA 601) require
# a minimum numeric grade of 80 or 90.
# =============================================================================

# CHEM 201 requires CHEM 101
- object: LearningFoundationItem
  fields:
    LearningId:
      reference: Learning_CHEM201
    LearningAchievementId:
      reference: Achievement_CHEM101
    Duration: 3
    DurationUnit: Credit Hours
    Type: Prerequisite

# CHEM 301 requires CHEM 201 (rigorous — minimum grade 80)
