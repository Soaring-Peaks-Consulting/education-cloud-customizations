- snowfakery_version: 3
# =============================================================================
# Snowfakery Recipe: Connected University — Course Catalog
# Objects: Learning, LearningCourse, LearningAchievement, LearningOutcomeItem,
#          LearningFoundationItem
#
# STRUCTURE
# ---------
# Each course is built as a Learning record with "friends" that create the
# tightly-coupled child records inline:
#   Learning (1)
#     └─ LearningCourse (1)          via friends
#     └─ LearningAchievement (1)     via friends
#     └─ LearningOutcomeItem (1)     via friends, references Learning + Achievement
#
# LearningFoundationItem (prerequisite links) are defined AFTER all courses
# so that both the dependent course's Learning and the prerequisite course's
# LearningAchievement are already available via nickname.
#
# COURSE COUNT
# ------------
# Explicit named sequences : 22 courses (with prerequisite chains)
# Random bulk courses       : 31 courses (via Dataset.iterate over learning_courses.csv)
# Total                     : 50 courses
#
# PREREQUISITE CHAINS
# -------------------
# CHEM 101 → CHEM 201 → CHEM 301
# MATH 101 → MATH 201 → MATH 301
# PHYS 101 → PHYS 201  (PHYS 101 also requires MATH 101)
# CS 101   → CS 201   → CS 301
# STAT 201 → STAT 301  (STAT 201 also requires MATH 101)
# FIN 301  → FIN 401   (Watson School, undergrad)
# MBA 501  → MBA 601   (Watson School, graduate)
#
# ACCOUNT REFERENCES (defined in sample_data.yml)
#   Connected : Connected University (IssuerId on all LearningAchievements)
#   Watson    : Watson School of Business (ProviderId on business courses)
# =============================================================================

# =============================================================================
