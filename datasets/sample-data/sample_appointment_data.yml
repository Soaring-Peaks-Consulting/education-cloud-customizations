- object: Shift
  nickname: Shift_GraduationAudit_Afternoon
  fields:
    StartTime:           ${{ first_monday.strftime("%Y-%m-%dT13:00:00.000-07:00") }}
    EndTime:             ${{ first_monday.strftime("%Y-%m-%dT17:00:00.000-07:00") }}
    RecurrencePattern:   RRULE:FREQ=WEEKLY;INTERVAL=1;BYDAY=MO,WE,FR;COUNT=30;
    ServiceResourceId:
      reference: AdamAdvisorResource
    ServiceTerritoryId:
      reference: ConnectedUniversityTerritory
    AppointmentCategoryId:
      reference: AppointmentCategory
    Status:              Confirmed
    Type:                Recurring
  friends:
    - object: ShiftWorkTopic
      fields:
        ShiftId:
          reference: Shift_GraduationAudit_Afternoon
        WorkTypeGroupId:
          reference: WTG_GraduationAudit
    - object: ShiftEngagementChannel
      fields:
        ShiftId:
          reference: Shift_GraduationAudit_Afternoon
        EngagementChannelTypeId:
          reference: ChannelType_InPerson

# =============================================================================
# CAREER PLANNING SHIFTS  (Tue/Thu, COUNT=20 for 10 weeks)
# First occurrence is first Tuesday of the month. Supports In Person only.
# =============================================================================

- object: Shift
  nickname: Shift_CareerPlanning_Morning
  fields:
    StartTime:           ${{ first_tuesday.strftime("%Y-%m-%dT09:00:00.000-07:00") }}
    EndTime:             ${{ first_tuesday.strftime("%Y-%m-%dT12:00:00.000-07:00") }}
