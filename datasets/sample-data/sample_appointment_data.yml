    ServiceResourceId:
      reference: AdamAdvisorResource
    ServiceTerritoryId:
      reference: ConnectedUniversityTerritory
    AppointmentCategoryId:
      reference: AppointmentCategory
    Status:              Confirmed
    Type:                Recurring
  friends:
    - object: ShiftWorkTopic
      fields:
        ShiftId:
          reference: Shift_CareerPlanning_Morning
        WorkTypeGroupId:
          reference: WTG_CareerPlanning
    - object: ShiftEngagementChannel
      fields:
        ShiftId:
          reference: Shift_CareerPlanning_Morning
        EngagementChannelTypeId:
          reference: ChannelType_InPerson

- object: Shift
  nickname: Shift_CareerPlanning_Afternoon
  fields:
    StartTime:           ${{ first_tuesday.strftime("%Y-%m-%dT13:00:00.000-07:00") }}
    EndTime:             ${{ first_tuesday.strftime("%Y-%m-%dT17:00:00.000-07:00") }}
    RecurrencePattern:   RRULE:FREQ=WEEKLY;INTERVAL=1;BYDAY=TU,TH;COUNT=20;
    ServiceResourceId:
      reference: AdamAdvisorResource
    ServiceTerritoryId:
      reference: ConnectedUniversityTerritory
    AppointmentCategoryId:
      reference: AppointmentCategory
    Status:              Confirmed
    Type:                Recurring
  friends:
    - object: ShiftWorkTopic
      fields:
        ShiftId:
          reference: Shift_CareerPlanning_Afternoon
        WorkTypeGroupId:
          reference: WTG_CareerPlanning
    - object: ShiftEngagementChannel
      fields:
        ShiftId:
          reference: Shift_CareerPlanning_Afternoon
        EngagementChannelTypeId:
          reference: ChannelType_InPerson

# =============================================================================
# SERVICE APPOINTMENTS — Adam Advisor & Sophia Student
# =============================================================================

# ── Date variables ─────────────────────────────────────────────────────────────

- var: last_friday
  value: ${{ today + relativedelta(days=-7, weekday=4) }}

- var: upcoming_friday
  value: ${{ today + relativedelta(days=1, weekday=4) }}

# =============================================================================
# PAST APPOINTMENT — Last Friday at 9:30am PT (Completed)
# =============================================================================

- object: ServiceAppointment
  nickname: SA_Sophia_LastFriday
  fields:
    AppointmentCategoryId:
      reference: AppointmentCategory
    ArrivalWindowStartTime:  ${{ last_friday.strftime("%Y-%m-%dT09:30:00.000-07:00") }}
    ArrivalWindowEndTime:    ${{ last_friday.strftime("%Y-%m-%dT10:00:00.000-07:00") }}
    ContactId:
      reference: Sophia_Contact
    DueDate:                 ${{ last_friday.strftime("%Y-%m-%dT10:00:00.000-07:00") }}
    Duration:                30
    DurationType:            Minutes
    EarliestStartTime:       ${{ last_friday.strftime("%Y-%m-%dT08:30:00.000-07:00") }}
    EngagementChannelTypeId:
      reference: ChannelType_InPerson
    ParentRecordId:
      reference: Case_Sophia
    SchedEndTime:            ${{ last_friday.strftime("%Y-%m-%dT10:00:00.000-07:00") }}
    SchedStartTime:          ${{ last_friday.strftime("%Y-%m-%dT09:30:00.000-07:00") }}
    ServiceTerritoryId:
      reference: ConnectedUniversityTerritory
    Status:                  Completed
    WorkTypeId:
      reference: WT_GeneralAdvising
  friends:
    - object: AssignedResource
      fields:
        ServiceAppointmentId:
          reference: SA_Sophia_LastFriday
        ServiceResourceId:
          reference: AdamAdvisorResource
        IsRequiredResource:  true


# =============================================================================
# UPCOMING APPOINTMENT — This Friday at 9:00am PT (Scheduled)
# =============================================================================

- object: ServiceAppointment
  nickname: SA_Sophia_UpcomingFriday
  fields:
    AppointmentCategoryId:
      reference: AppointmentCategory
    ArrivalWindowStartTime:  ${{ upcoming_friday.strftime("%Y-%m-%dT09:00:00.000-07:00") }}
    ArrivalWindowEndTime:    ${{ upcoming_friday.strftime("%Y-%m-%dT09:30:00.000-07:00") }}
    ContactId:
      reference: Sophia_Contact
    DueDate:                 ${{ upcoming_friday.strftime("%Y-%m-%dT09:30:00.000-07:00") }}
    Duration:                30
    DurationType:            Minutes
    EarliestStartTime:       ${{ upcoming_friday.strftime("%Y-%m-%dT08:00:00.000-07:00") }}
    EngagementChannelTypeId:
      reference: ChannelType_InPerson
    ParentRecordId:
      reference: Case_Sophia
    SchedEndTime:            ${{ upcoming_friday.strftime("%Y-%m-%dT09:30:00.000-07:00") }}
    SchedStartTime:          ${{ upcoming_friday.strftime("%Y-%m-%dT09:00:00.000-07:00") }}
    ServiceTerritoryId:
      reference: ConnectedUniversityTerritory
    Status:                  Scheduled
    WorkTypeId:
      reference: WT_GeneralAdvising
  friends:
    - object: AssignedResource
      fields:
        ServiceAppointmentId:
          reference: SA_Sophia_UpcomingFriday
        ServiceResourceId:
          reference: AdamAdvisorResource
        IsRequiredResource:  true