    Name:        ${{ "Summer " + (ay_start_year - 2)|string + " - Intensive" }}
    Description: ${{ "5-week intensive session, Summer " + (ay_start_year - 2)|string + "." }}
    IsActive:    false
    AcademicTermId:
      reference: Term_Summer_minus3

