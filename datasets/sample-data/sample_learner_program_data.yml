- snowfakery_version: 3
# =============================================================================
# Snowfakery Recipe: Connected University — Learner Programs & Requirements
# Objects: LearnerProgram, LearnerProgramRequirement
#
# STUDENT SUMMARY
# ---------------
# Sophia       — Active Freshman    — BS Computer Science    (started Fall current)
# Student_2    — Active Senior      — BS Mathematics         (started Fall minus3)
# Student_3    — Active Grad        — MS Data Science        (started Fall minus1)
# Student_4    — Completed Alumni   — BBA                    (completed Spring minus1)
# Student_5    — Active Sophomore   — BS Biology             (started Fall minus1)
# Student_6    — Active Junior      — BA Psychology          (started Fall minus2, re-admitted)
# Student_7    — Active Grad        — MS Computer Science    (started Fall minus2, re-admitted)
#
# STATUS LOGIC
# ------------
# Completed requirements: courses the student has already finished based on
#   their academic standing and terms completed.
# Active requirements: courses the student is currently working toward.
# LearnerProgram.Status: Active for currently enrolled; Completed for alumni.
#
# DATES
# -----
# StartDate / EndDate / ExpectedGraduationDate use today + relativedelta
# anchored to academic year start (ay_start_year from academic calendar recipe).
# Approximations:
#   Fall semester start  : August 1
#   Spring semester start: January 6
#   Spring semester end  : May 15
# =============================================================================

# =============================================================================
# SOPHIA STUDENT — BS Computer Science
# Incoming Freshman, enrolled Fall current only.
# All requirements Active (just started).
# Expected graduation: Spring 4 years from now.
# =============================================================================

- object: LearnerProgram
  nickname: LP_Sophia_BSCS
  fields:
    Name: ${{ Sophia.FirstName + " " + Sophia.LastName + "'s " + Plan_BS_ComputerScience.Name + " Learner Program" }}
    LearnerAccountId:
      reference: Sophia
    LearnerContactId:
      reference: Sophia_Contact
    LearningProgramPlanId:
      reference: Plan_BS_ComputerScience
    StartDate: ${{ today.replace(year=ay_start_year, month=8, day=1) }}
    ExpectedGraduationDate: ${{ today.replace(year=ay_start_year+4, month=5, day=15) }}
    Status: Active
  friends:
    - object: LearnerProgramRequirement
      fields:
        LearnerProgramId:
          reference: LP_Sophia_BSCS
        LearningProgramPlanRqmtId:
          reference: Rqmt_BSCS_CS101
        Name: ${{ Rqmt_BSCS_CS101.Name }}
        Status: Active
    - object: LearnerProgramRequirement
      fields:
        LearnerProgramId:
          reference: LP_Sophia_BSCS
        LearningProgramPlanRqmtId:
          reference: Rqmt_BSCS_CS201
        Name: ${{ Rqmt_BSCS_CS201.Name }}
        Status: Active
    - object: LearnerProgramRequirement
      fields:
        LearnerProgramId:
          reference: LP_Sophia_BSCS
        LearningProgramPlanRqmtId:
          reference: Rqmt_BSCS_CS301
        Name: ${{ Rqmt_BSCS_CS301.Name }}
        Status: Active
    - object: LearnerProgramRequirement
      fields:
        LearnerProgramId:
          reference: LP_Sophia_BSCS
        LearningProgramPlanRqmtId:
          reference: Rqmt_BSCS_MATH101
        Name: ${{ Rqmt_BSCS_MATH101.Name }}
        Status: Active
    - object: LearnerProgramRequirement
      fields:
        LearnerProgramId:
          reference: LP_Sophia_BSCS
        LearningProgramPlanRqmtId:
          reference: Rqmt_BSCS_MATH201
        Name: ${{ Rqmt_BSCS_MATH201.Name }}
        Status: Active
    - object: LearnerProgramRequirement
      fields:
        LearnerProgramId:
          reference: LP_Sophia_BSCS
        LearningProgramPlanRqmtId:
          reference: Rqmt_BSCS_STAT201
        Name: ${{ Rqmt_BSCS_STAT201.Name }}
        Status: Active
    - object: LearnerProgramRequirement
      fields:
        LearnerProgramId:
          reference: LP_Sophia_BSCS
        LearningProgramPlanRqmtId:
          reference: Rqmt_BSCS_Elec
        Name: ${{ Rqmt_BSCS_Elec.Name }}
        Status: Active

