            from: PermissionSet
            where: Name='EducationCloudAccess'
    - object: PermissionSetAssignment
      fields:
        AssigneeId:
          reference: Adam
        PermissionSetId:
          SalesforceQuery.find_record:
            from: PermissionSet
            where: Name='OmniStudioExecution'