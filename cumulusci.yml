minimum_cumulusci_version: '4.8.0'
project:
    name: education-cloud-customizations
    package:
        name: education-cloud-customizations
        api_version: '63.0'
    git:
        default_branch: 'main'
    source_format: sfdx

flows:
    deploy_unmanaged:
        steps:
            3.2:
                flow: deploy_education_cloud_customizations

    dev_org_with_community:
        steps:
            1: 
                flow: dev_org
            2:
                flow: setup_education_cloud_community

    deploy_education_cloud_customizations:
        description: Assigns the necessary permission sets to the running user and deploys various metadata components including record types, account settings, and custom report types. Also deploys a quickstart for appointment scheduling in Education Cloud, and sets org-wide sharing settings for the relevant Education Cloud objects.
        steps:
            1:
                task: assign_permission_sets
                options:
                    api_names: EducationCloudAccess, OmniStudioExecution
            2:
                task: deploy_account_record_types
            3:
                flow: deploy_appointments_quickstart
            4:
                task: deploy_case_record_types
            5:
                task: deploy_individual_application_record_types
            6:
                task: deploy_learning_achievement_record_types
            7:
                task: deploy_custom_report_types
            8:
                task: set_education_cloud_objects_org_wide_defaults
            9:
                task: update_admin_profile
                options:
                    record_types:
                        - record_type: Account.College
                          visible: true
                          default: true
                        - record_type: Case.Academic
                          visible: true
                          default: true
                        - record_type: IndividualApplication.Admissions
                          visible: true
                          default: true
                        - record_type: LearningAchievement.Learning_Course
                          visible: true
                          default: true
                        - record_type: LearningAchievement.Learning_Program
                          visible: true
                          default: false
                        - record_type: LearningAchievement.Achievement_Group
                          visible: true
                          default: false
            10:
                flow: insert_sample_data

    deploy_appointments_quickstart:
        description: Deploys basic setup for appointment scheduling in Education Cloud, as well as Public Read Only org-wide sharing settings for the relevant objects.
        steps:
            1:
                task: deploy_appointments_quickstart
            2:
                task: set_education_cloud_appointment_objects_org_wide_defaults
            3:
                task: add_page_layout_related_lists
                options:
                    related_list: ShiftWorkTopics
                    api_names: "Shift-Shift Layout"
            4:
                task: add_page_layout_related_lists
                options:
                    related_list: ShiftEngagementChannels
                    api_names: "Shift-Shift Layout"

    insert_sample_data:
        description: Inserts sample data for testing and demonstration purposes.
        steps:
            1:
                task: snowfakery
                options:
                    recipe: datasets/sample-data/sample_data.yml
                    drop_missing_schema: true

    setup_education_cloud_community:
        description: Creates and publishes a community using the Education Portal template.
        steps:
            1:
                task: execute_anon
                options:
                    apex: 
                        UserRole president = new UserRole(Name='President');
                        insert president;
                        User adminUser = [SELECT Id FROM User WHERE Id = :UserInfo.getUserId()];
                        adminUser.UserRoleId = president.Id;
                        update adminUser;
            2:
                task: create_community
                options:
                    name: Connected University Student Portal
                    template: Education Portal
                    timeout: 600
            3:
                task: publish_community
                options:
                    name: Connected University Student Portal
            4: 
                task: create_network_member_groups
                options:
                    network_name: Connected University Student Portal
                    profile_names: Customer Community Plus User
            5:
                task: snowfakery
                options:
                    recipe: datasets/community-sample-data/community_sample_data.yml
                    drop_missing_schema: true
            6:
                task: deploy_sharing_settings
                    
tasks:
    robot:
        options:
            suites: robot/education-cloud-customizations/tests
            options:
                outputdir: robot/education-cloud-customizations/results

    robot_testdoc:
        options:
            path: robot/education-cloud-customizations/tests
            output: robot/education-cloud-customizations/doc/education-cloud-customizations_tests.html

    run_tests:
        options:
            required_org_code_coverage_percent: 75

    deploy_account_record_types:
        class_path: cumulusci.tasks.salesforce.Deploy
        description: Deploys standard Account record types (College) for Education Cloud.
        options:
            path: unpackaged/account-record-types

    deploy_appointments_quickstart:
        class_path: cumulusci.tasks.salesforce.Deploy
        description: Deploys basic setup for appointment scheduling in Education Cloud.
        options:
            path: unpackaged/appointments-quickstart

    deploy_case_record_types:
        class_path: cumulusci.tasks.salesforce.Deploy
        description: Deploys standard Case record types (Academic) for Education Cloud, as well as the business processes.
        options:
            path: unpackaged/case-record-types

    deploy_custom_report_types:
        class_path: cumulusci.tasks.salesforce.Deploy
        description: Deploys custom report types for Education Cloud.
        options:
            path: unpackaged/custom-report-types

    deploy_individual_application_record_types:
        class_path: cumulusci.tasks.salesforce.Deploy
        description: Deploys standard Individual Application record types (Admissions) for Education Cloud, as well as the Application Record Type Config.
        options:
            path: unpackaged/individual-application-record-types

    deploy_learning_achievement_record_types:
        class_path: cumulusci.tasks.salesforce.Deploy
        description: Deploys standard Learning Achievement record types (Learning Course, Learning Program, and Achievement Group) for Education Cloud, as well as the Learning Achievement Config.
        options:
            path: unpackaged/learning-achievement-record-types

    set_education_cloud_objects_org_wide_defaults:
        class_path: cumulusci.tasks.metadata_etl.SetOrgWideDefaults
        description: Updates the organization-wide sharing settings for the relevant Education Cloud objects.
        options:
            org_wide_defaults: [{
                api_name: AcademicSession,
                internal_sharing_model: Read,
                external_sharing_model: Read
            }, {
                api_name: AcademicTerm,
                internal_sharing_model: Read,
                external_sharing_model: Read
            }, {
                api_name: AcademicYear,
                internal_sharing_model: Read,
                external_sharing_model: Read
            }, {
                api_name: ApplicationRenderMethod,
                internal_sharing_model: Read,
                external_sharing_model: Read
            }, {
                api_name: ApplicationStageDefinition,
                internal_sharing_model: Read,
                external_sharing_model: Read
            }, {
                api_name: ApplicationTimeline,
                internal_sharing_model: Read,
                external_sharing_model: Read
            }, {
                api_name: CourseOffering,
                internal_sharing_model: Read,
                external_sharing_model: Read
            }, {
                api_name: Examination,
                internal_sharing_model: Read,
                external_sharing_model: Read
            }, {
                api_name: Learning,
                internal_sharing_model: Read,
                external_sharing_model: Read
            }, {
                api_name: LearningAchievement,
                internal_sharing_model: Read,
                external_sharing_model: Read
            }, {
                api_name: LearningPathwayTemplate,
                internal_sharing_model: Read,
                external_sharing_model: Read
            }, {
                api_name: ProgramTermApplnTimeline,
                internal_sharing_model: Read,
                external_sharing_model: Read
            }]

    set_education_cloud_appointment_objects_org_wide_defaults:
        class_path: cumulusci.tasks.metadata_etl.SetOrgWideDefaults
        description: Updates the organization-wide sharing settings for the objects related to appointment scheduling in Education Cloud.
        options:
            org_wide_defaults: [{
                api_name: EngagementChannelType,
                internal_sharing_model: Read,
                external_sharing_model: Read
            }, {
                api_name: Location,
                internal_sharing_model: Read,
                external_sharing_model: Read
            }, {
                api_name: OperatingHours,
                internal_sharing_model: Read,
                external_sharing_model: Read
            }, {
                api_name: ServiceResource,
                internal_sharing_model: Read,
                external_sharing_model: Read
            }, {
                api_name: ServiceTerritory,
                internal_sharing_model: Read,
                external_sharing_model: Read
            }, {
                api_name: Shift,
                internal_sharing_model: Read,
                external_sharing_model: Read
            }, {
                api_name: SuccessTeam,
                internal_sharing_model: Read,
                external_sharing_model: Read
            }, {
                api_name: WorkType,
                internal_sharing_model: Read,
                external_sharing_model: Read
            }, {
                api_name: WorkTypeGroup,
                internal_sharing_model: Read,
                external_sharing_model: Read
            }]

    deploy_sharing_settings:
        class_path: cumulusci.tasks.salesforce.Deploy
        description: Deploys sharing settings for the Connected University Student Portal.
        options:
            path: unpackaged/sharing-settings